<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Весенняя прополка слов — A1 Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sage: #EAF1E4;
    --sage-deep: #DCE9D3;
    --ink: #263626;
    --ink-soft: #4A5B49;
    --card: #FFFFFF;
    --tulip: #C1667A;
    --tulip-deep: #9C4A5D;
    --leaf: #6E9A4E;
    --leaf-deep: #4F7536;
    --wrong: #C1666B;
    --wrong-bg: #FBEAEA;
    --right: #4F7536;
    --right-bg: #EAF3E2;
    --border: #D3DFC9;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--sage);
    background-image:
      radial-gradient(circle at 8% 12%, rgba(193,102,122,0.10), transparent 40%),
      radial-gradient(circle at 92% 85%, rgba(110,154,78,0.14), transparent 45%);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    padding: 0 0 80px;
    min-height: 100vh;
  }

  header{
    max-width: 760px;
    margin: 0 auto;
    padding: 56px 24px 20px;
    text-align: center;
  }

  .eyebrow{
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--tulip-deep);
    font-weight: 600;
    margin-bottom: 10px;
  }

  h1{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(28px, 5vw, 42px);
    margin: 0 0 12px;
    line-height: 1.15;
  }

  header p{
    color: var(--ink-soft);
    font-size: 15.5px;
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.55;
  }

  /* Growing tulip progress signature */
  .garden{
    max-width: 760px;
    margin: 28px auto 8px;
    padding: 0 24px;
  }
  .garden-track{
    position: relative;
    height: 64px;
    background: linear-gradient(180deg, transparent 60%, var(--sage-deep) 60%);
    border-radius: 12px;
    overflow: hidden;
  }
  .garden-fill{
    position: absolute;
    left: 0; bottom: 0;
    height: 100%;
    width: 0%;
    transition: width 0.5s ease;
    display:flex;
    align-items:flex-end;
    overflow: hidden;
  }
  .tulip-row{
    display:flex;
    align-items:flex-end;
    gap: 6px;
    padding-left: 6px;
  }
  .stats-line{
    display:flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 8px;
  }
  .stats-line b{ color: var(--ink); }

  main{
    max-width: 760px;
    margin: 0 auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .card{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 22px;
    box-shadow: 0 1px 2px rgba(38,54,38,0.04);
    transition: box-shadow 0.2s ease, border-color 0.2s ease;
  }

  .card.correct{
    border-color: var(--right);
    background: var(--right-bg);
  }
  .card.incorrect{
    border-color: var(--wrong);
    background: var(--wrong-bg);
  }

  .card-index{
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--tulip-deep);
    font-size: 13px;
    margin-bottom: 6px;
  }

  .en-word{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 20px;
    color: var(--ink);
  }

  .en-example{
    color: var(--ink-soft);
    font-size: 14px;
    font-style: italic;
    margin: 4px 0 14px;
    line-height: 1.4;
  }

  .answer-row{
    display:flex;
    gap: 10px;
    align-items: stretch;
  }

  input[type="text"]{
    flex: 1;
    padding: 11px 14px;
    border-radius: 9px;
    border: 1.5px solid var(--border);
    background: #FCFDFB;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s ease;
  }
  input[type="text"]:focus{
    border-color: var(--leaf);
  }
  .card.correct input[type="text"]{ border-color: var(--right); }
  .card.incorrect input[type="text"]{ border-color: var(--wrong); }

  .feedback{
    margin-top: 10px;
    font-size: 13.5px;
    display: none;
    line-height: 1.5;
  }
  .card.correct .feedback.ok{ display:block; color: var(--right); font-weight: 600; }
  .card.incorrect .feedback.no{ display:block; color: var(--wrong); }
  .feedback.no .correct-answer{ font-weight: 600; color: var(--ink); }
  .feedback .ru-example{
    display:block;
    font-style: italic;
    color: var(--ink-soft);
    font-weight: 400;
    margin-top: 3px;
  }

  .reveal-line{
    margin-top: 10px;
    font-size: 13.5px;
    color: var(--tulip-deep);
    display: none;
  }
  .card.revealed .reveal-line{ display:block; }
  .card.revealed .answer-row{ display:none; }
  .card.revealed .feedback{ display:none !important; }

  .toolbar{
    position: sticky;
    bottom: 0;
    max-width: 760px;
    margin: 20px auto 0;
    padding: 16px 24px 24px;
    display:flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  button{
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14.5px;
    border-radius: 999px;
    padding: 13px 26px;
    border: none;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  button:active{ transform: scale(0.97); }

  .btn-primary{
    background: var(--leaf);
    color: white;
    box-shadow: 0 4px 14px rgba(79,117,54,0.28);
  }
  .btn-primary:hover{ background: var(--leaf-deep); }

  .btn-ghost{
    background: var(--card);
    color: var(--ink-soft);
    border: 1.5px solid var(--border);
  }
  .btn-ghost:hover{ border-color: var(--ink-soft); color: var(--ink); }

  .btn-reset{
    background: transparent;
    color: var(--tulip-deep);
    border: 1.5px solid var(--tulip);
  }
  .btn-reset:hover{ background: var(--tulip); color: white; }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }

  @media (max-width: 480px){
    .answer-row{ flex-direction: column; }
    header{ padding-top: 40px; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">A1 · English → Russian</div>
  <h1>Весенняя прополка слов</h1>
  <p>18 слов и фраз о доме и весне. Прочитайте английское слово и пример, впишите перевод на русский. Затем проверьте себя — каждый правильный ответ распускает новый тюльпан.</p>
</header>

<div class="garden">
  <div class="garden-track">
    <div class="garden-fill" id="gardenFill">
      <div class="tulip-row" id="tulipRow"></div>
    </div>
  </div>
  <div class="stats-line">
    <span>Правильных ответов: <b id="scoreText">0 / 18</b></span>
    <span id="statusText">Заполните поля и нажмите «Проверить»</span>
  </div>
</div>

<main id="cardsContainer"></main>

<div class="toolbar">
  <button class="btn-primary" id="checkBtn">Проверить ответы</button>
  <button class="btn-ghost" id="revealBtn">Показать ответы</button>
  <button class="btn-reset" id="resetBtn">Начать заново</button>
</div>

<script>
const DATA = [
  { en:"mailbox", exEn:"I checked my mailbox this morning", ru:"почтовый ящик", exRu:"Я проверил свой почтовый ящик сегодня утром" },
  { en:"tulips", exEn:"I bought tulips for my mother", ru:"тюльпаны", exRu:"Я купил тюльпаны для мамы" },
  { en:"will be", exEn:"Tomorrow will be the fourth of March", ru:"будет", exRu:"Завтра будет четвёртое марта" },
  { en:"look forward to", exEn:"I look forward to the weekend", ru:"ждать с нетерпением", exRu:"Я с нетерпением жду выходных" },
  { en:"herbs", exEn:"I grow herbs in my kitchen", ru:"травы", exRu:"Я выращиваю травы на кухне" },
  { en:"housework", exEn:"I do housework every Saturday", ru:"работа по дому", exRu:"Я делаю работу по дому каждую субботу" },
  { en:"make the bed", exEn:"I make the bed every morning", ru:"застилать кровать", exRu:"Я застилаю кровать каждое утро" },
  { en:"wash the dishes", exEn:"I wash the dishes after dinner", ru:"мыть посуду", exRu:"Я мою посуду после ужина" },
  { en:"clean the floor", exEn:"I clean the floor every week", ru:"мыть пол", exRu:"Я мою пол каждую неделю" },
  { en:"what's wrong", exEn:"What's wrong with your car?", ru:"что не так / в чём проблема", exRu:"Что не так с твоей машиной?" },
  { en:"cluttered", exEn:"My desk is cluttered with papers", ru:"загромождённый, захламлённый", exRu:"Мой стол захламлён бумагами" },
  { en:"purse", exEn:"She keeps her money in a purse", ru:"сумочка", exRu:"Она хранит деньги в сумочке" },
  { en:"wallet", exEn:"I put my ID in my wallet", ru:"бумажник, кошелёк", exRu:"Я положил своё удостоверение в кошелёк" },
  { en:"They are easy to find on my desk", exEn:"The pens are easy to find on my desk", ru:"их легко найти на моём столе", exRu:"Ручки легко найти на моём столе" },
  { en:"spring", exEn:"Spring is my favourite season", ru:"весна", exRu:"Весна — моё любимое время года" },
  { en:"clutter", exEn:"There is too much clutter on the desk", ru:"беспорядок, захламление", exRu:"На столе слишком много беспорядка" },
  { en:"declutter", exEn:"I decluttered my room yesterday", ru:"приводить в порядок, расчищать", exRu:"Вчера я навёл порядок в комнате" },
  { en:"create clutter", exEn:"Too many items can create clutter in the room", ru:"создавать беспорядок", exRu:"Слишком много вещей может создавать беспорядок в комнате" },
];

const cardsContainer = document.getElementById('cardsContainer');
const scoreText = document.getElementById('scoreText');
const statusText = document.getElementById('statusText');
const gardenFill = document.getElementById('gardenFill');
const tulipRow = document.getElementById('tulipRow');

const TULIP_SVG = `<svg width="18" height="52" viewBox="0 0 18 52" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
  <path d="M9 52 L9 20" stroke="#4F7536" stroke-width="2.5" fill="none"/>
  <path d="M9 34 Q3 30 4 24" stroke="#6E9A4E" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="9" cy="12" rx="7" ry="10" fill="#C1667A"/>
  <ellipse cx="4" cy="14" rx="4" ry="8" fill="#9C4A5D" opacity="0.85"/>
  <ellipse cx="14" cy="14" rx="4" ry="8" fill="#9C4A5D" opacity="0.85"/>
</svg>`;

function norm(s){
  return s.toLowerCase()
    .replace(/ё/g,'е')
    .replace(/[.,!?;:"'«»()]/g,'')
    .replace(/\s+/g,' ')
    .trim();
}

// Accept any one of slash/comma-separated acceptable variants
function isCorrect(userInput, correctRu){
  const variants = correctRu.split(/[\/,]/).map(v => norm(v)).filter(Boolean);
  const guess = norm(userInput);
  if (!guess) return false;
  return variants.some(v => v === guess || guess.includes(v) || v.includes(guess));
}

function render(){
  cardsContainer.innerHTML = '';
  DATA.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = idx;
    card.innerHTML = `
      <div class="card-index">Слово ${idx + 1} из ${DATA.length}</div>
      <div class="en-word">${item.en}</div>
      <div class="en-example">${item.exEn}</div>
      <div class="answer-row">
        <input type="text" placeholder="Введите перевод на русском…" data-idx="${idx}">
      </div>
      <div class="feedback ok">✓ Верно! <span class="ru-example">${item.exRu}</span></div>
      <div class="feedback no">✗ Правильный ответ: <span class="correct-answer">${item.ru}</span><span class="ru-example">${item.exRu}</span></div>
      <div class="reveal-line">Ответ: <b>${item.ru}</b> — <i>${item.exRu}</i></div>
    `;
    cardsContainer.appendChild(card);
  });
}

function updateGarden(correctCount){
  const total = DATA.length;
  const pct = (correctCount / total) * 100;
  gardenFill.style.width = pct + '%';
  scoreText.textContent = `${correctCount} / ${total}`;

  tulipRow.innerHTML = '';
  for (let i = 0; i < correctCount; i++){
    tulipRow.insertAdjacentHTML('beforeend', TULIP_SVG);
  }

  if (correctCount === 0){
    statusText.textContent = 'Заполните поля и нажмите «Проверить»';
  } else if (correctCount === total){
    statusText.textContent = 'Все тюльпаны распустились! Отлично 🌷';
  } else {
    statusText.textContent = `Растёт ${correctCount} из ${total} тюльпанов`;
  }
}

function checkAnswers(){
  let correctCount = 0;
  document.querySelectorAll('.card').forEach(card => {
    if (card.classList.contains('revealed')) return;
    const idx = Number(card.dataset.index);
    const input = card.querySelector('input');
    const item = DATA[idx];
    card.classList.remove('correct', 'incorrect');
    if (isCorrect(input.value, item.ru)){
      card.classList.add('correct');
      correctCount++;
    } else if (input.value.trim() !== ''){
      card.classList.add('incorrect');
    }
  });
  // count already-revealed cards toward garden growth too, so it doesn't look broken
  document.querySelectorAll('.card.revealed').forEach(() => {});
  updateGarden(correctCount);
}

function revealAll(){
  document.querySelectorAll('.card').forEach(card => {
    card.classList.remove('correct', 'incorrect');
    card.classList.add('revealed');
  });
  updateGarden(DATA.length);
  statusText.textContent = 'Показаны все ответы';
}

function resetAll(){
  render();
  updateGarden(0);
}

document.getElementById('checkBtn').addEventListener('click', checkAnswers);
document.getElementById('revealBtn').addEventListener('click', revealAll);
document.getElementById('resetBtn').addEventListener('click', resetAll);

cardsContainer.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.target.tagName === 'INPUT'){
    e.preventDefault();
    checkAnswers();
  }
});

render();
updateGarden(0);
</script>

</body>
</html>
