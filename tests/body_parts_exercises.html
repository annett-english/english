<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anatomy of a Word — части тела</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#e9e4d8;
    --paper-2:#ded6c4;
    --ink:#20261f;
    --ink-soft:#4a5245;
    --brick:#a63d2f;
    --brick-dim:#c96a56;
    --teal:#2f5f5a;
    --gold:#b98d2b;
    --line:#c9beac;
    --ok:#3c6b46;
    --bad:#a63d2f;
    --radius:2px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(32,38,31,0.06) 1px, transparent 0);
    background-size: 22px 22px;
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px;margin:0 auto;padding:36px 20px 80px;}

  /* ===== Header ===== */
  header{
    border-bottom:2px solid var(--ink);
    padding-bottom:22px;
    margin-bottom:28px;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:20px;
    flex-wrap:wrap;
  }
  .title-block .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--brick);
    margin-bottom:6px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:44px;
    margin:0;
    letter-spacing:-0.01em;
  }
  h1 em{font-style:italic;font-weight:400;color:var(--teal);}
  .subtitle{
    font-family:'Fraunces', serif;
    font-style:italic;
    color:var(--ink-soft);
    font-size:16px;
    margin-top:6px;
  }
  .plate{
    width:96px;height:96px;flex:0 0 auto;
  }

  /* ===== Nav ===== */
  nav{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:8px;
    margin-bottom:30px;
  }
  nav button{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.03em;
    text-align:left;
    background:var(--paper-2);
    border:1px solid var(--line);
    color:var(--ink-soft);
    padding:10px 8px;
    cursor:pointer;
    border-radius:var(--radius);
    transition:background .15s, color .15s, border-color .15s;
    line-height:1.35;
  }
  nav button .num{
    display:block;
    font-family:'Fraunces',serif;
    font-size:20px;
    color:var(--brick);
    margin-bottom:2px;
  }
  nav button:hover{border-color:var(--ink);}
  nav button.active{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }
  nav button.active .num{color:var(--gold);}

  /* ===== Section ===== */
  section.exercise{display:none;}
  section.exercise.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  .ex-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
    border-bottom:1px solid var(--line);
    padding-bottom:14px;
    margin-bottom:22px;
    flex-wrap:wrap;
  }
  .ex-head h2{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:26px;
    margin:0 0 4px;
  }
  .ex-head p{
    margin:0;
    color:var(--ink-soft);
    font-size:14.5px;
    max-width:520px;
  }
  .fig-tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--teal);
    border:1px solid var(--teal);
    padding:4px 8px;
    white-space:nowrap;
    border-radius:var(--radius);
  }

  .subhead{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--brick);
    margin:26px 0 12px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .subhead::after{content:"";flex:1;height:1px;background:var(--line);}

  .item{
    display:grid;
    grid-template-columns:34px 1fr auto;
    gap:12px;
    align-items:center;
    padding:12px 0;
    border-bottom:1px dashed var(--line);
  }
  .item .idx{
    font-family:'Fraunces',serif;
    font-size:18px;
    color:var(--brick-dim);
  }
  .item .prompt{font-size:15px;}
  .item .prompt .masked{
    font-family:'IBM Plex Mono',monospace;
    font-size:16px;
    letter-spacing:.06em;
    color:var(--teal);
  }
  .item input[type=text]{
    font-family:'Work Sans', sans-serif;
    font-size:14px;
    padding:8px 10px;
    border:1px solid var(--line);
    background:#fff;
    border-radius:var(--radius);
    width:150px;
    color:var(--ink);
  }
  .item input[type=text]:focus{outline:2px solid var(--teal);outline-offset:1px;}
  .item.correct input{border-color:var(--ok);background:#eef4ee;}
  .item.wrong input{border-color:var(--bad);background:#f7ebe8;}
  .fb{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    min-width:150px;
  }
  .fb.ok{color:var(--ok);}
  .fb.bad{color:var(--bad);}

  .tf-row{
    display:grid;
    grid-template-columns:34px 1fr auto;
    gap:12px;
    align-items:center;
    padding:12px 0;
    border-bottom:1px dashed var(--line);
  }
  .tf-btns{display:flex;gap:6px;}
  .tf-btns button{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    padding:7px 12px;
    border:1px solid var(--line);
    background:#fff;
    cursor:pointer;
    border-radius:var(--radius);
    color:var(--ink-soft);
  }
  .tf-btns button.sel{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .tf-row.correct .tf-btns button.sel{background:var(--ok);border-color:var(--ok);}
  .tf-row.wrong .tf-btns button.sel{background:var(--bad);border-color:var(--bad);}

  .rank-item{
    display:grid;
    grid-template-columns:70px 1fr;
    gap:14px;
    align-items:center;
    padding:10px 0;
    border-bottom:1px dashed var(--line);
  }
  .rank-item input{
    width:52px;text-align:center;
    font-family:'IBM Plex Mono',monospace;
    padding:8px 4px;border:1px solid var(--line);border-radius:var(--radius);
  }

  textarea{
    width:100%;
    font-family:'Work Sans', sans-serif;
    font-size:14px;
    padding:10px;
    border:1px solid var(--line);
    border-radius:var(--radius);
    resize:vertical;
    min-height:52px;
    background:#fff;
    color:var(--ink);
  }
  .sentence-item{padding:12px 0;border-bottom:1px dashed var(--line);}
  .sentence-item .prompt{margin-bottom:8px;font-size:15px;}
  .sample{
    margin-top:8px;
    font-size:13px;
    font-style:italic;
    color:var(--teal);
    display:none;
    border-left:2px solid var(--teal);
    padding-left:10px;
  }
  .sample.show{display:block;}

  .controls{
    display:flex;
    gap:10px;
    margin-top:22px;
    flex-wrap:wrap;
    align-items:center;
  }
  .btn{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:.03em;
    padding:11px 20px;
    border-radius:var(--radius);
    cursor:pointer;
    border:1px solid var(--ink);
    background:var(--ink);
    color:var(--paper);
    transition:opacity .15s;
  }
  .btn:hover{opacity:.85;}
  .btn.secondary{
    background:transparent;
    color:var(--ink);
  }
  .btn.ghost{
    background:transparent;
    color:var(--teal);
    border-color:var(--teal);
  }
  .score{
    font-family:'Fraunces',serif;
    font-size:15px;
    color:var(--brick);
    margin-left:auto;
  }
  .score b{font-size:20px;}

  footer{
    margin-top:50px;
    padding-top:18px;
    border-top:1px solid var(--line);
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }

  @media(max-width:720px){
    nav{grid-template-columns:repeat(3,1fr);}
    h1{font-size:32px;}
    .item,.tf-row{grid-template-columns:24px 1fr;grid-template-areas:"idx prompt" "fb fb";}
    .item .idx,.tf-row .idx{grid-area:idx;}
    .item .prompt,.tf-row .prompt{grid-area:prompt;}
    .fb, .item input, .tf-btns{grid-area:fb;margin-top:8px;justify-self:start;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title-block">
      <div class="eyebrow">English Vocabulary — Practice Plate No. 07</div>
      <h1>Anatomy of a <em>Word</em></h1>
      <div class="subtitle">части тела на английском — 6 упражнений, чтобы выучить и проверить себя</div>
    </div>
    <svg class="plate" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="48" cy="48" r="46" stroke="#20261f" stroke-width="1.5"/>
      <ellipse cx="48" cy="40" rx="20" ry="24" stroke="#a63d2f" stroke-width="1.4"/>
      <path d="M30 40 Q48 28 66 40" stroke="#2f5f5a" stroke-width="1.4" fill="none"/>
      <circle cx="39" cy="40" r="3" stroke="#20261f" stroke-width="1.2"/>
      <circle cx="57" cy="40" r="3" stroke="#20261f" stroke-width="1.2"/>
      <path d="M42 56 Q48 60 54 56" stroke="#20261f" stroke-width="1.4" fill="none"/>
    </svg>
  </header>

  <nav id="nav"></nav>

  <main id="exercises"></main>

  <footer>
    <span>HEAD &amp; FACE · UPPER BODY · LOWER BODY</span>
    <span>25 terms — practice plate 07</span>
  </footer>
</div>

<script>
/* ============ DATA ============ */

const ex1 = { // fill in missing letters
  title:"1. Вставь пропущенные буквы",
  tag:"FIG. 01 — SPELLING",
  desc:"Посмотри на слово с пропущенными буквами и впиши слово целиком.",
  items:[
    {masked:"h_ir", answer:"hair"},
    {masked:"ey_br_w", answer:"eyebrow"},
    {masked:"sh__ld_r", answer:"shoulder"},
    {masked:"st_m_ch", answer:"stomach"},
    {masked:"f_ng_rs", answer:"fingers"},
    {masked:"_nkl_", answer:"ankle"},
    {masked:"h__l", answer:"heel"},
    {masked:"ch_st", answer:"chest"},
    {masked:"t_ng_e", answer:"tongue"},
    {masked:"p_lm", answer:"palm"},
  ]
};

const ex2 = { // translate ru -> en
  title:"2. Переведи на английский",
  tag:"FIG. 02 — TRANSLATION",
  desc:"Напиши английское слово, соответствующее русскому.",
  items:[
    {masked:"волосы", answer:"hair"},
    {masked:"бровь", answer:"eyebrow"},
    {masked:"нос", answer:"nose"},
    {masked:"щека", answer:"cheek"},
    {masked:"губы", answer:"lips"},
    {masked:"зубы", answer:"teeth"},
    {masked:"плечо", answer:"shoulder"},
    {masked:"живот", answer:"stomach"},
    {masked:"ладонь", answer:"palm"},
    {masked:"лодыжка", answer:"ankle"},
  ]
};

const ex3 = { // definitions
  title:"3. Угадай слово по определению",
  tag:"FIG. 03 — DEFINITION",
  desc:"Прочитай определение на английском и напиши, о какой части тела идёт речь.",
  items:[
    {masked:"The part of your face above the eye, with hair, that you can raise in surprise.", answer:"eyebrow", isSentence:true},
    {masked:"The muscle inside your mouth used for tasting food and speaking.", answer:"tongue", isSentence:true},
    {masked:"The joint where your arm meets your body.", answer:"shoulder", isSentence:true},
    {masked:"The joint in the middle of your leg that bends when you sit down.", answer:"knee", isSentence:true},
    {masked:"The back part of your foot, the first to touch the ground when you walk.", answer:"heel", isSentence:true},
    {masked:"The hard white parts inside your mouth used for biting and chewing food.", answer:"teeth", isSentence:true},
    {masked:"The part of the body that connects your head to your shoulders.", answer:"neck", isSentence:true},
    {masked:"The joint that connects your foot to your leg.", answer:"ankle", isSentence:true},
    {masked:"The inner, flat surface of your hand.", answer:"palm", isSentence:true},
    {masked:"The organ on your face used for smelling and breathing.", answer:"nose", isSentence:true},
  ]
};

const ex4 = { // context / gap fill
  title:"4. Заполни пропуск по контексту",
  tag:"FIG. 04 — CONTEXT",
  desc:"Вставь подходящее слово из темы «части тела» вместо пропуска.",
  items:[
    {masked:"She twisted her ___ while running in the park.", answer:"ankle", isSentence:true},
    {masked:"I whispered, but he has a bad ___ and didn't hear me.", answer:"ear", isSentence:true},
    {masked:"My ___ hurts — I ate way too much cake.", answer:"stomach", isSentence:true},
    {masked:"The dentist checked all my ___ for cavities.", answer:"teeth", isSentence:true},
    {masked:"He raised his ___ in surprise when he read the letter.", answer:"eyebrow", altAnswers:["eyebrows"], isSentence:true},
    {masked:"She shrugged her ___s, meaning she didn't know the answer.", answer:"shoulder", altAnswers:["shoulders"], isSentence:true},
    {masked:"The baby always sucks his ___ when he's sleepy.", answer:"thumb", isSentence:true},
    {masked:"He carried the heavy backpack on his ___ all day.", answer:"back", isSentence:true},
    {masked:"Her new shoes were too tight and hurt her ___.", answer:"toes", isSentence:true},
    {masked:"I felt the cool water in the ___ of my hand.", answer:"palm", isSentence:true},
  ]
};

const ex5 = { // guess the word riddles
  title:"5. Guess the word — отгадай слово",
  tag:"FIG. 05 — RIDDLE",
  desc:"Прочитай загадку-описание и напиши, какое это слово.",
  items:[
    {masked:"I have five on each hand, and one of us is short and called the 'thumb'. What are we?", answer:"fingers", isSentence:true},
    {masked:"You have two of us, and we let you see the whole world around you.", answer:"eyes", isSentence:true},
    {masked:"I cover your head and can be short, long, curly or straight.", answer:"hair", isSentence:true},
    {masked:"I connect your foot to your leg, and I easily get twisted during sports.", answer:"ankle", isSentence:true},
    {masked:"I help you taste sweet, salty and sour — and I also help you talk.", answer:"tongue", isSentence:true},
    {masked:"I'm the long part of your body between your shoulder and your hand.", answer:"arm", isSentence:true},
    {masked:"I'm the back part of the foot — the first part to touch the ground when you walk.", answer:"heel", isSentence:true},
    {masked:"I'm the small joint in the middle of your leg — you bend me to sit down.", answer:"knee", isSentence:true},
  ]
};

/* rank + true/false + own sentences */
const rankItems = [
  {label:"a broken back", key:"a"},
  {label:"a sprained ankle", key:"b"},
  {label:"a scratched cheek", key:"c"},
  {label:"a bruised knee", key:"d"},
  {label:"a cut finger", key:"e"},
];
const rankModel = "1 — broken back, 2 — sprained ankle, 3 — bruised knee, 4 — cut finger, 5 — scratched cheek (обсудите: серьёзность зависит от того, насколько травма мешает двигаться и как долго заживает).";

const tfItems = [
  {text:"Adults normally have 32 teeth.", answer:true},
  {text:"The tongue is located in the lower body.", answer:false},
  {text:"Toes are part of the foot.", answer:true},
  {text:"The palm is on the back side of the hand.", answer:false},
  {text:"Eyebrows help keep sweat out of your eyes.", answer:true},
  {text:"The heel is part of the upper body.", answer:false},
  {text:"Humans normally have ten fingers in total, including thumbs.", answer:true},
  {text:"The stomach is located above the chest.", answer:false},
  {text:"The ankle connects the foot to the leg.", answer:true},
  {text:"Eyelashes and eyebrows are the same thing.", answer:false},
];

const sentenceItems = [
  {prompt:"If I could change one part of my body, I would change my ___ because…", sample:"…my eyesight, because I want to see the stars more clearly without glasses."},
  {prompt:"The most useful body part for a musician is ___ because…", sample:"…the fingers, because a pianist needs them to move fast and precisely."},
  {prompt:"When I'm nervous, my ___…", sample:"…hands start shaking and my stomach feels tight."},
  {prompt:"A good doctor should always check a patient's ___ first because…", sample:"…the eyes, because they can reveal a lot about a person's health."},
  {prompt:"If aliens had no ___, they would have trouble…", sample:"…ears — they would have trouble hearing our music and warnings."},
];

/* ============ RENDER HELPERS ============ */
const norm = s => s.trim().toLowerCase().replace(/[.!?]/g,"");

function buildWordExercise(data, containerId){
  const c = document.getElementById(containerId);
  c.innerHTML = data.items.map((it,i)=>{
    const label = it.isSentence
      ? `<span>${it.masked.replace("___","<b>_____</b>")}</span>`
      : `<span class="masked">${it.masked}</span>`;
    return `
    <div class="item" id="${containerId}-item-${i}">
      <div class="idx">${String(i+1).padStart(2,'0')}</div>
      <div class="prompt">${label}</div>
      <input type="text" id="${containerId}-input-${i}" placeholder="type here" autocomplete="off">
    </div>`;
  }).join("");
}

function checkWordExercise(data, containerId, scoreId){
  let score = 0;
  data.items.forEach((it,i)=>{
    const inputEl = document.getElementById(`${containerId}-input-${i}`);
    const itemEl = document.getElementById(`${containerId}-item-${i}`);
    const val = norm(inputEl.value);
    const accepted = [it.answer, ...(it.altAnswers||[])].map(norm);
    itemEl.classList.remove("correct","wrong");
    let fb = itemEl.querySelector(".fb");
    if(!fb){
      fb = document.createElement("div");
      fb.className="fb";
      itemEl.appendChild(fb);
    }
    if(val.length===0){
      fb.textContent = "—";
      fb.className="fb";
    } else if(accepted.includes(val)){
      itemEl.classList.add("correct");
      fb.textContent = "верно";
      fb.className="fb ok";
      score++;
    } else {
      itemEl.classList.add("wrong");
      fb.textContent = "неверно";
      fb.className="fb bad";
    }
  });
  document.getElementById(scoreId).innerHTML = `<b>${score}</b> / ${data.items.length}`;
}

function revealWordExercise(data, containerId, scoreId){
  data.items.forEach((it,i)=>{
    const inputEl = document.getElementById(`${containerId}-input-${i}`);
    const itemEl = document.getElementById(`${containerId}-item-${i}`);
    inputEl.value = it.answer;
    itemEl.classList.remove("wrong");
    itemEl.classList.add("correct");
    let fb = itemEl.querySelector(".fb");
    if(!fb){ fb = document.createElement("div"); fb.className="fb"; itemEl.appendChild(fb); }
    fb.textContent = "ответ показан";
    fb.className="fb ok";
  });
  document.getElementById(scoreId).innerHTML = `<b>${data.items.length}</b> / ${data.items.length}`;
}

/* ============ EXERCISE 6 (rank / true-false / sentences) render ============ */
function buildEx6(){
  const rankHtml = rankItems.map((r,i)=>`
    <div class="rank-item" id="rank-item-${i}">
      <input type="text" maxlength="1" id="rank-input-${i}" placeholder="№">
      <div>${r.label}</div>
    </div>`).join("");

  const tfHtml = tfItems.map((t,i)=>`
    <div class="tf-row" id="tf-row-${i}">
      <div class="idx">${String(i+1).padStart(2,'0')}</div>
      <div class="prompt">${t.text}</div>
      <div class="tf-btns" data-answer="${t.answer}">
        <button data-val="true" onclick="selectTF(${i}, true, this)">True</button>
        <button data-val="false" onclick="selectTF(${i}, false, this)">False</button>
      </div>
    </div>`).join("");

  const sentHtml = sentenceItems.map((s,i)=>`
    <div class="sentence-item" id="sent-item-${i}">
      <div class="prompt">${String(i+1).padStart(2,'0')}. ${s.prompt}</div>
      <textarea id="sent-input-${i}" placeholder="напиши свою идею на английском..."></textarea>
      <div class="sample" id="sent-sample-${i}">Пример: ${s.sample}</div>
    </div>`).join("");

  document.getElementById("ex6-rank").innerHTML = rankHtml;
  document.getElementById("ex6-tf").innerHTML = tfHtml;
  document.getElementById("ex6-sent").innerHTML = sentHtml;
}

const tfSelections = {};
function selectTF(i, val, btn){
  tfSelections[i] = val;
  const row = document.getElementById(`tf-row-${i}`);
  row.querySelectorAll(".tf-btns button").forEach(b=>b.classList.remove("sel"));
  btn.classList.add("sel");
  row.classList.remove("correct","wrong");
}

function checkTF(){
  let score = 0;
  tfItems.forEach((t,i)=>{
    const row = document.getElementById(`tf-row-${i}`);
    row.classList.remove("correct","wrong");
    if(tfSelections[i] === undefined) return;
    if(tfSelections[i] === t.answer){
      row.classList.add("correct"); score++;
    } else {
      row.classList.add("wrong");
    }
  });
  document.getElementById("tf-score").innerHTML = `<b>${score}</b> / ${tfItems.length}`;
}

function revealTF(){
  tfItems.forEach((t,i)=>{
    const row = document.getElementById(`tf-row-${i}`);
    const btn = row.querySelector(`button[data-val="${t.answer}"]`);
    row.querySelectorAll(".tf-btns button").forEach(b=>b.classList.remove("sel"));
    btn.classList.add("sel");
    tfSelections[i] = t.answer;
    row.classList.remove("wrong");
    row.classList.add("correct");
  });
  document.getElementById("tf-score").innerHTML = `<b>${tfItems.length}</b> / ${tfItems.length}`;
}

function checkRank(){
  const vals = rankItems.map((r,i)=>document.getElementById(`rank-input-${i}`).value.trim());
  const filled = vals.filter(v=>v.length>0);
  const unique = new Set(filled);
  const box = document.getElementById("rank-feedback");
  if(filled.length < rankItems.length){
    box.textContent = "Заполни все номера от 1 до 5, чтобы получить ранжирование.";
    box.className = "fb bad";
  } else if(unique.size < rankItems.length){
    box.textContent = "Каждый номер (1–5) должен встречаться только один раз.";
    box.className = "fb bad";
  } else {
    box.textContent = "Ранжирование засчитано — это открытое задание, сравни со своим ответом в «Показать пример».";
    box.className = "fb ok";
  }
}

function revealRank(){
  document.getElementById("rank-model").classList.add("show");
}

function revealSentences(){
  sentenceItems.forEach((s,i)=>{
    document.getElementById(`sent-sample-${i}`).classList.add("show");
  });
}

  {id:"ex4", data:ex4},

  const nav = document.getElementById("nav");

        <div class="score" id="${id}-score"><b>–</b> / ${data.items.length}</div>
      </div>

  });

  html += `
  <section class="exercise" id="ex6">
    <div class="ex-head">
      <div>
        <h2>6. Ранжирование · Правда/ложь · Свои идеи</h2>
        <p>Три коротких задания: расставь приоритеты, оцени утверждения и закончи фразы своими словами.</p>
      </div>
      <div class="fig-tag">FIG. 06 — MIXED</div>
    </div>

    <div class="subhead">Rank them — от 1 (самое серьёзное) до 5 (наименее серьёзное)</div>
    <p style="font-size:14px;color:var(--ink-soft);margin-top:-4px;">Which injury is the most serious? Rank these from 1 (most serious) to 5 (least serious).</p>
    <div id="ex6-rank"></div>
    <div class="controls">
      <button class="btn" onclick="checkRank()">Проверить</button>
      <button class="btn secondary" onclick="revealRank()">Показать пример ответа</button>
    </div>
    <div class="fb" id="rank-feedback" style="margin-top:8px;"></div>
    <div class="sample" id="rank-model">Пример: ${rankModel}</div>

    <div class="subhead">True or False</div>
    <div id="ex6-tf"></div>
    <div class="controls">
      <button class="btn" onclick="checkTF()">Проверить</button>
      <button class="btn secondary" onclick="revealTF()">Показать ответы</button>
      <div class="score" id="tf-score"><b>–</b> / ${tfItems.length}</div>

      <button class="btn ghost" onclick="revealSentences()">Показать пример ответа</button>
    </div>
  </section>`;

  main.innerHTML = html;

  wordExercises.forEach(({id,data})=> buildWordExercise(data, `${id}-list`));

function idRef(id){
  return {ex1:"ex1",ex2:"ex2",ex3:"ex3",ex4:"ex4",ex5:"ex5"}[id] || id;
}
// map string id back to data object for inline onclick calls
const dataById = {ex1, ex2, ex3, ex4, ex5};
function checkWordExerciseWrap(id, listId, scoreId){ checkWordExercise(dataById[id], listId, scoreId); }
function revealWordExerciseWrap(id, listId, scoreId){ revealWordExercise(dataById[id], listId, scoreId); }

function showExercise(id){
  document.querySelectorAll("section.exercise").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  document.querySelector(`nav button[data-target="${id}"]`).classList.add("active");
}

renderNav();
renderExercises();
showExercise("ex1");
</script>
