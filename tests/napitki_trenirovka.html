<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Меню тренировок: напитки &amp; грамматика</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --board:#1F3B33;
    --board-2:#294a40;
    --paper:#F3EAD8;
    --paper-2:#ece0c8;
    --ink:#26241f;
    --copper:#C9A227;
    --wine:#7A2E3B;
    --wine-2:#5f2430;
    --ok:#3f7d54;
    --bad:#b23a3a;
    --line: rgba(38,36,31,0.15);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', system-ui, sans-serif;
    line-height:1.5;
  }
  .hero{
    background:
      radial-gradient(1200px 400px at 15% -20%, rgba(201,162,39,0.18), transparent 60%),
      linear-gradient(180deg, var(--board), var(--board-2));
    color:var(--paper);
    padding:52px 20px 64px;
    text-align:center;
    position:relative;
    border-bottom:6px solid var(--copper);
  }
  .hero .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:.18em;
    text-transform:uppercase;
    font-size:12px;
    color:var(--copper);
    margin-bottom:14px;
  }
  .hero h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:clamp(30px, 5vw, 52px);
    margin:0 0 12px;
  }
  .hero p{
    max-width:560px;
    margin:0 auto;
    color:#e7ded0;
    font-size:15.5px;
  }
  .tabs{
    max-width:920px;
    margin:-28px auto 0;
    display:flex;
    gap:10px;
    padding:0 20px;
    position:relative;
    z-index:5;
    justify-content:center;
    flex-wrap:wrap;
  }
  .tab-btn{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    letter-spacing:.04em;
    background:var(--paper);
    border:2px solid var(--board);
    color:var(--board);
    padding:14px 22px;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 6px 0 rgba(0,0,0,0.12);
    transition:transform .12s ease;
  }
  .tab-btn:hover{transform:translateY(-2px);}
  .tab-btn.active{
    background:var(--wine);
    border-color:var(--wine);
    color:#fff;
  }
  main{max-width:920px;margin:0 auto;padding:40px 20px 100px;}
  .panel{display:none;}
  .panel.active{display:block;}

  .ref-card{
    background:var(--paper);
    border:1.5px dashed var(--wine-2);
    border-radius:14px;
    padding:22px 24px;
    margin-bottom:38px;
  }
  .ref-card h2{
    font-family:'Fraunces', serif;
    font-size:20px;
    margin:0 0 14px;
  }
  .ref-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(230px,1fr));
    gap:8px 20px;
    font-size:14.5px;
  }
  .ref-grid div span.en{font-weight:600;}
  .ref-grid div span.ru{color:#5a5646;}

  section.topic-reminder{
    background:var(--board);
    color:var(--paper);
    border-radius:16px;
    padding:24px 26px;
    margin:34px 0 22px;
    position:relative;
    overflow:hidden;
  }
  section.topic-reminder::before{
    content:"";
    position:absolute; inset:0;
    background:repeating-linear-gradient(115deg, rgba(255,255,255,0.035) 0 2px, transparent 2px 26px);
    pointer-events:none;
  }
  section.topic-reminder h3{
    font-family:'Fraunces', serif;
    color:var(--copper);
    margin:0 0 10px;
    font-size:19px;
  }
  section.topic-reminder .rule{margin:6px 0;font-size:14.5px;}
  section.topic-reminder .rule b{color:#fff;}
  section.topic-reminder .warn{
    margin-top:10px;
    font-size:13.5px;
    color:#f0d9a8;
    border-top:1px solid rgba(255,255,255,0.18);
    padding-top:10px;
  }

  .exercise{
    background:#fffdf8;
    border:1px solid var(--line);
    border-left:5px solid var(--wine);
    border-radius:12px;
    padding:22px 24px 20px;
    margin-bottom:26px;
    box-shadow:0 2px 10px rgba(38,36,31,0.05);
  }
  .exercise .ex-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:6px;
  }
  .exercise h4{
    font-family:'Fraunces', serif;
    font-size:18px;
    margin:0;
    color:var(--wine);
  }
  .exercise .instr{
    font-size:13.5px;
    color:#65614f;
    margin:0 0 16px;
  }
  .item{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:10px 0;
    border-bottom:1px dotted var(--line);
    font-size:15px;
  }
  .item:last-of-type{border-bottom:none;}
  .item .num{
    font-family:'IBM Plex Mono', monospace;
    color:var(--copper);
    background:var(--board);
    min-width:24px;height:24px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;flex-shrink:0;margin-top:2px;
  }
  .item .q{flex:1;min-width:180px;}
  .item .answer-input, .item select{
    font-family:'Inter', sans-serif;
    font-size:14.5px;
    padding:7px 10px;
    border:1.5px solid var(--line);
    border-radius:8px;
    background:#fff;
    min-width:170px;
    outline-offset:2px;
  }
  .item .answer-input:focus, .item select:focus{border-color:var(--wine);}
  .item.correct{color:var(--ok);}
  .item.incorrect{color:var(--bad);}
  .item .answer-input.correct, .item select.correct{border-color:var(--ok); background:#f0f9f2;}
  .item .answer-input.incorrect, .item select.incorrect{border-color:var(--bad); background:#fbf0f0;}
  .item .fb{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    min-width:20px;
  }
  .item .correct-answer-note{
    font-size:12.5px;
    color:var(--ok);
    display:block;
    margin-top:3px;
    font-style:italic;
  }
  .radio-opts{display:flex;flex-direction:column;gap:6px;flex:1;min-width:220px;}
  .radio-opts label{
    display:flex;gap:8px;align-items:flex-start;
    padding:6px 10px;border:1.5px solid var(--line);border-radius:8px;cursor:pointer;
    font-size:14px;
  }
  .radio-opts label:hover{border-color:var(--copper);}
  .radio-opts label.correct{border-color:var(--ok); background:#f0f9f2;}
  .radio-opts label.incorrect{border-color:var(--bad); background:#fbf0f0;}

  .ex-actions{
    display:flex;
    align-items:center;
    gap:12px;
    margin-top:16px;
    flex-wrap:wrap;
  }
  button.btn{
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    letter-spacing:.03em;
    border:none;
    padding:10px 18px;
    border-radius:999px;
    cursor:pointer;
    transition:transform .1s ease, opacity .1s ease;
  }
  button.btn:active{transform:scale(0.97);}
  .btn-check{background:var(--wine); color:#fff;}
  .btn-show{background:transparent; color:var(--board); border:1.5px solid var(--board);}
  .btn-reset{background:transparent; color:#8a8674; border:1.5px solid var(--line);}
  .score-badge{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    padding:8px 14px;
    border-radius:999px;
    border:1.5px dashed var(--copper);
    color:var(--wine);
    min-width:80px;
    text-align:center;
  }

  footer{
    text-align:center;
    padding:30px 20px 50px;
    font-size:12.5px;
    color:#8a8674;
  }
  @media (max-width:560px){
    .item{flex-wrap:wrap;}
    .item .answer-input, .item select{width:100%;min-width:0;}
  }
</style>
</head>
<body>

<div class="hero">
  <div class="eyebrow">Practice Menu · Напитки и грамматика</div>
  <h1>Меню тренировок</h1>
  <p>Словарь напитков (11 позиций) и грамматика a few / a little, too much / too many, enough — с проверкой ответов и подсказками.</p>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="vocab">🥂 Словарь напитков</button>
  <button class="tab-btn" data-tab="grammar">📖 Грамматика</button>
</div>

<main>

  <!-- VOCAB PANEL -->
  <div class="panel active" id="panel-vocab">

    <div class="ref-card">
      <h2>Слова к разделу</h2>
      <div class="ref-grid" id="ref-grid"></div>
    </div>

    <div id="vocab-exercises"></div>
  </div>

  <!-- GRAMMAR PANEL -->
  <div class="panel" id="panel-grammar">
    <div id="grammar-exercises"></div>
  </div>

</main>

<footer>Проверяйте ответы кнопкой «Проверить», а если не уверены — жмите «Показать ответы».</footer>

<script>
/* ---------- DATA ---------- */

const wordBank = ["sparkling water","champagne","dry wine","soft drinks","fizzy drinks",
  "smoothie","beer","iced tea","semi-dry wine","semi-sweet wine","still water","decaf coffee"];

const wordRef = [
  ["sparkling water","газированная вода"],
  ["champagne","шампанское"],
  ["dry wine","сухое вино"],
  ["soft drinks / fizzy drinks","безалкогольные / газированные напитки"],
  ["smoothie","смузи"],
  ["beer","пиво"],
  ["iced tea","холодный чай"],
  ["semi-dry wine","полусухое вино"],
  ["semi-sweet wine","полусладкое вино"],
  ["still water","негазированная вода"],
  ["decaf coffee","кофе без кофеина"]
];

const vocabExercises = [
  {
    id:"v1", title:"1. Вставьте пропущенные буквы",
    instr:"Впишите слово или фразу целиком (буквы вместо «_» пропущены).",
    type:"text",
    items:[
      {q:"sp_rkl_ng w_t_r", a:"sparkling water"},
      {q:"ch_mp_gne", a:"champagne"},
      {q:"dr_ w_ne", a:"dry wine"},
      {q:"f_zzy dr_nks", a:"fizzy drinks"},
      {q:"sm__th_e", a:"smoothie"},
      {q:"b__r", a:"beer"},
      {q:"_ced t_a", a:"iced tea"},
      {q:"dec_f c_ffee", a:"decaf coffee"}
    ]
  },
  {
    id:"v2", title:"2. Перевод с русского на английский",
    instr:"Напишите английский эквивалент.",
    type:"text",
    items:[
      {q:"газированная вода", a:"sparkling water"},
      {q:"шампанское", a:"champagne"},
      {q:"сухое вино", a:"dry wine"},
      {q:"безалкогольные напитки", a:"soft drinks|fizzy drinks"},
      {q:"смузи", a:"smoothie"},
      {q:"пиво", a:"beer"},
      {q:"полусухое вино", a:"semi-dry wine"},
      {q:"вода без газа", a:"still water"}
    ]
  },
  {
    id:"v3", title:"3. Дефиниция",
    instr:"Выберите слово, которое подходит под определение.",
    type:"select", bank:wordBank,
    items:[
      {q:"A wine that is not sweet at all.", a:"dry wine"},
      {q:"Water with bubbles of gas in it.", a:"sparkling water"},
      {q:"A thick drink made by blending fruit with ice, milk or yogurt.", a:"smoothie"},
      {q:"Coffee that has had almost all its caffeine removed.", a:"decaf coffee"},
      {q:"A sparkling wine traditionally made in one region of France, often served to celebrate.", a:"champagne"},
      {q:"Tea that is served cold, usually with ice cubes.", a:"iced tea"},
      {q:"A wine with a taste between dry and sweet, but closer to sweet.", a:"semi-sweet wine"},
      {q:"Water that has no gas or bubbles at all.", a:"still water"}
    ]
  },
  {
    id:"v4", title:"4. Сочетаемость фраз",
    instr:"Допишите слово/фразу, которая обычно сочетается с данным словом-контейнером.",
    type:"text",
    items:[
      {q:"a bottle of ___ (чтобы отметить праздник)", a:"champagne"},
      {q:"a glass of ___ (вино совсем не сладкое)", a:"dry wine"},
      {q:"a pint of ___ (в английском пабе)", a:"beer"},
      {q:"a cup of ___ (кофе без кофеина)", a:"decaf coffee"},
      {q:"a can of ___ (кола, лимонад и т.п.)", a:"fizzy drinks|soft drinks"},
      {q:"a jug of ___ (холодный чай со льдом)", a:"iced tea"},
      {q:"a bottle of ___ (вода без пузырьков)", a:"still water"},
      {q:"a glass of ___ (вино между сухим и сладким, ближе к сладкому)", a:"semi-sweet wine"}
    ]
  },
  {
    id:"v5", title:"5. Контекст",
    instr:"Вставьте подходящее слово/фразу по смыслу предложения.",
    type:"text",
    items:[
      {q:"I don't drink alcohol, so I'll just have a ___.", a:"soft drink|fizzy drink"},
      {q:"This water has bubbles — it's ___.", a:"sparkling water"},
      {q:"We opened a bottle of ___ to celebrate the New Year.", a:"champagne"},
      {q:"He likes wine that isn't sweet at all, so he always orders ___.", a:"dry wine"},
      {q:"On a hot day, nothing beats a cold glass of ___.", a:"iced tea"},
      {q:"I ordered a ___ made with strawberries and banana.", a:"smoothie"},
      {q:"She can't drink caffeine at night, so she asks for ___.", a:"decaf coffee"},
      {q:"This wine isn't very dry — actually it's quite ___.", a:"semi-sweet wine|semi-sweet"}
    ]
  },
  {
    id:"v6", title:"6. Соедините половинки выражений",
    instr:"Выберите вторую половину выражения.",
    type:"select", bank:["water","wine","tea","coffee","drinks"],
    items:[
      {q:"sparkling ___", a:"water"},
      {q:"still ___", a:"water"},
      {q:"dry ___", a:"wine"},
      {q:"semi-dry ___", a:"wine"},
      {q:"semi-sweet ___", a:"wine"},
      {q:"iced ___", a:"tea"},
      {q:"decaf ___", a:"coffee"},
      {q:"fizzy ___", a:"drinks"}
    ]
  }
];

const remA = `<h3>📌 A FEW vs. A LITTLE</h3>
  <p class="rule">✅ <b>a few</b> — с исчисляемыми существительными во множественном числе: a few apples, a few books, a few friends.</p>
  <p class="rule">✅ <b>a little</b> — с неисчисляемыми существительными: a little water, a little money, a little sugar.</p>
  <p class="warn">⚠️ few / little (без a) выражают недостаток и звучат скорее отрицательно: I have few friends. / I have little time.</p>`;

const remB = `<h3>Too much / too many / too + adjective</h3>
  <p class="rule">1️⃣ <b>too much</b> — с неисчисляемыми: too much coffee, too much money, too much time. Или после глагола: He eats too much.</p>
  <p class="rule">2️⃣ <b>too many</b> — с исчисляемыми во множественном числе: too many cakes, too many people, too many books.</p>
  <p class="rule">3️⃣ <b>too + adjective</b> — перед прилагательным: I'm too tired. It's too expensive.</p>
  <p class="warn">⚠️ Неправильно: I'm too much tired.</p>`;

const remC = `<h3>Enough</h3>
  <p class="rule">1️⃣ <b>enough + noun</b> — перед существительным: I have enough money to buy a ticket.</p>
  <p class="rule">2️⃣ <b>verb + enough</b> — после глагола без дополнения: He doesn't eat enough. Do you sleep enough?</p>
  <p class="rule">3️⃣ <b>adjective/adverb + enough</b> — после прилагательного/наречия: She isn't old enough to drive. He didn't work hard enough.</p>`;

const grammarExercises = [
  {
    id:"g1", reminder:remA, title:"7. A few / a little — потренируемся отдельно",
    instr:"Выберите a few или a little.", type:"select", bank:["a few","a little"],
    items:[
      {q:"I have ___ friends in this city.", a:"a few"},
      {q:"She added ___ sugar to her tea.", a:"a little"},
      {q:"We need ___ apples for the pie.", a:"a few"},
      {q:"Can I have ___ water, please?", a:"a little"},
      {q:"There are ___ books on the shelf.", a:"a few"},
      {q:"He has ___ money left.", a:"a little"},
      {q:"I bought ___ oranges yesterday.", a:"a few"},
      {q:"Add ___ salt to the soup.", a:"a little"}
    ]
  },
  {
    id:"g2", title:"8. A few / a little / few / little — вместе",
    instr:"Выберите правильный вариант из четырёх.", type:"select", bank:["a few","a little","few","little"],
    items:[
      {q:"I have ___ time, so let's hurry.", a:"little"},
      {q:"She has ___ close friends, but they are loyal.", a:"few"},
      {q:"We have ___ apples, so we can make a fruit salad.", a:"a few"},
      {q:"There's ___ milk left in the fridge.", a:"a little"},
      {q:"Unfortunately, ___ people came to the meeting.", a:"few"},
      {q:"I need ___ minutes to finish this.", a:"a few"},
      {q:"He has ___ experience in this field, so it might be difficult.", a:"little"},
      {q:"Could you give me ___ advice?", a:"a little"}
    ]
  },
  {
    id:"g3", reminder:remB, title:"9. Too much / too many — потренируемся отдельно",
    instr:"Выберите too much или too many.", type:"select", bank:["too much","too many"],
    items:[
      {q:"There are ___ people in this room.", a:"too many"},
      {q:"He drinks ___ coffee every day.", a:"too much"},
      {q:"You have ___ books, you can't read them all!", a:"too many"},
      {q:"She spends ___ money on clothes.", a:"too much"},
      {q:"There were ___ cakes for such a small party.", a:"too many"},
      {q:"We have ___ time — let's relax.", a:"too much"},
      {q:"___ students missed the exam.", a:"too many"},
      {q:"I ate ___ sugar today.", a:"too much"}
    ]
  },
  {
    id:"g4", title:"10. Too much / too many / too + adjective — вместе",
    instr:"Выберите правильный вариант.", type:"select", bank:["too much","too many","too"],
    items:[
      {q:"This bag is ___ heavy for me to carry.", a:"too"},
      {q:"I have ___ work to finish today.", a:"too much"},
      {q:"It's ___ cold to go outside without a coat.", a:"too"},
      {q:"There are ___ mistakes in this essay.", a:"too many"},
      {q:"He's ___ tired to keep working.", a:"too"},
      {q:"She bought ___ clothes for the trip.", a:"too many"},
      {q:"This soup has ___ salt in it.", a:"too much"},
      {q:"The exam was ___ difficult for beginners.", a:"too"}
    ]
  },
  {
    id:"g5", reminder:remC, title:"11. Enough — впишите фразу",
    instr:"Впишите enough (иногда со словом рядом), чтобы предложение было верным.",
    type:"text",
    items:[
      {q:"I don't have ___ to buy this car.", a:"enough money"},
      {q:"Is this tea sweet ___ for you?", a:"enough"},
      {q:"He didn't practice ___ before the match.", a:"enough"},
      {q:"We don't have ___ for everyone to sit down.", a:"enough chairs"},
      {q:"She isn't old ___ to get a driving licence.", a:"enough"},
      {q:"They didn't have ___ to finish the project on time.", a:"enough time"},
      {q:"This box isn't light ___ to carry alone.", a:"enough"},
      {q:"He doesn't earn ___ to support his family.", a:"enough money"}
    ]
  },
  {
    id:"g6", title:"12. Enough — выберите верный вариант",
    instr:"Отметьте предложение с правильным порядком слов.", type:"radio",
    items:[
      {opts:["I have enough money.","I have money enough."], a:0},
      {opts:["She is enough old to vote.","She is old enough to vote."], a:1},
      {opts:["He doesn't work hard enough.","He doesn't work enough hard."], a:0},
      {opts:["We don't have enough chairs.","We don't have chairs enough."], a:0},
      {opts:["Do you sleep enough?","Do you enough sleep?"], a:0},
      {opts:["It's not enough big.","It's not big enough."], a:1},
      {opts:["I don't have time enough.","I don't have enough time."], a:1},
      {opts:["She isn't enough fast to win.","She isn't fast enough to win."], a:1}
    ]
  },
  {
    id:"g7", title:"13. Микс на ошибки", reminder:`<h3>Финальный микс</h3><p class="rule">Во каждом предложении спрятана одна ошибка на a few/a little/few/little, too much/too many или enough. Найдите её и впишите исправленную часть фразы (не всё предложение).</p>`,
    instr:"Впишите исправленный фрагмент (например: too many cups).",
    type:"text",
    items:[
      {q:"I have a little friends in this town.", a:"a few friends"},
      {q:"He drinks too much cups of coffee every morning.", a:"too many cups"},
      {q:"She isn't enough old to drive.", a:"old enough"},
      {q:"There are too much people at the party.", a:"too many people"},
      {q:"We have few money for the trip, so we must be careful.", a:"little money"},
      {q:"I need few minutes to think about it.", a:"a few minutes"},
      {q:"This bag is too heavy much for me to carry.", a:"too heavy"},
      {q:"He doesn't have time enough to finish it.", a:"enough time"}
    ]
  }
];

/* ---------- RENDER ---------- */

function refGrid(){
  const el = document.getElementById("ref-grid");
  el.innerHTML = wordRef.map(([en,ru])=>`<div><span class="en">${en}</span> — <span class="ru">${ru}</span></div>`).join("");
}

function checkAnswer(user, correct){
  const u = user.trim().toLowerCase();
  return correct.split("|").some(c => c.trim().toLowerCase() === u);
}

function renderExercise(ex){
  let itemsHtml = "";

  if(ex.type === "text"){
    itemsHtml = ex.items.map((it,i)=>`
      <div class="item" data-idx="${i}" data-answer="${it.a.replace(/"/g,'&quot;')}">
        <span class="num">${i+1}</span>
        <span class="q">${it.q}</span>
        <input type="text" class="answer-input" placeholder="ответ">
        <span class="fb"></span>
      </div>`).join("");
  } else if(ex.type === "select"){
    const optsHtml = `<option value="">— выбрать —</option>` + ex.bank.map(o=>`<option value="${o}">${o}</option>`).join("");
    itemsHtml = ex.items.map((it,i)=>`
      <div class="item" data-idx="${i}" data-answer="${it.a.replace(/"/g,'&quot;')}">
        <span class="num">${i+1}</span>
        <span class="q">${it.q}</span>
        <select>${optsHtml}</select>
        <span class="fb"></span>
      </div>`).join("");
  } else if(ex.type === "radio"){
    itemsHtml = ex.items.map((it,i)=>`
      <div class="item" data-idx="${i}" data-answer="${it.a}">
        <span class="num">${i+1}</span>
        <div class="radio-opts">
          <label><input type="radio" name="${ex.id}-${i}" value="0"> ${it.opts[0]}</label>
          <label><input type="radio" name="${ex.id}-${i}" value="1"> ${it.opts[1]}</label>
        </div>
        <span class="fb"></span>
      </div>`).join("");
  }

  const reminderHtml = ex.reminder ? `<section class="topic-reminder">${ex.reminder}</section>` : "";

  return `
    ${reminderHtml}
    <div class="exercise" id="ex-${ex.id}" data-type="${ex.type}">
      <div class="ex-head">
        <h4>${ex.title}</h4>
        <span class="score-badge" id="score-${ex.id}">—</span>
      </div>
      <p class="instr">${ex.instr}</p>
      ${itemsHtml}
      <div class="ex-actions">
        <button class="btn btn-check" onclick="checkExercise('${ex.id}')">✅ Проверить</button>
        <button class="btn btn-show" onclick="showAnswers('${ex.id}')">👁 Показать ответы</button>
        <button class="btn btn-reset" onclick="resetExercise('${ex.id}')">↺ Сбросить</button>
      </div>
    </div>`;
}

function renderAll(){
  refGrid();
  document.getElementById("vocab-exercises").innerHTML = vocabExercises.map(renderExercise).join("");
  document.getElementById("grammar-exercises").innerHTML = grammarExercises.map(renderExercise).join("");
}

/* ---------- LOGIC ---------- */

function checkExercise(id){
  const box = document.getElementById("ex-" + id);
  const type = box.dataset.type;
  const items = box.querySelectorAll(".item");
  let correctCount = 0;

  items.forEach(item=>{
    const answer = item.dataset.answer;
    const fb = item.querySelector(".fb");
    let userVal = "";
    let isCorrect = false;

    if(type === "text"){
      const input = item.querySelector(".answer-input");
      userVal = input.value;
      isCorrect = userVal.trim() !== "" && checkAnswer(userVal, answer);
      input.classList.remove("correct","incorrect");
      input.classList.add(isCorrect ? "correct" : "incorrect");
    } else if(type === "select"){
      const sel = item.querySelector("select");
      userVal = sel.value;
      isCorrect = userVal !== "" && checkAnswer(userVal, answer);
      sel.classList.remove("correct","incorrect");
      sel.classList.add(isCorrect ? "correct" : "incorrect");
    } else if(type === "radio"){
      const checked = item.querySelector("input[type=radio]:checked");
      item.querySelectorAll(".radio-opts label").forEach(l=>l.classList.remove("correct","incorrect"));
      if(checked){
        userVal = checked.value;
        isCorrect = String(userVal) === String(answer);
        checked.closest("label").classList.add(isCorrect ? "correct" : "incorrect");
      }
    }

    fb.textContent = isCorrect ? "✓" : (userVal ? "✕" : "");
    if(isCorrect) correctCount++;
  });

  document.getElementById("score-" + id).textContent = correctCount + " / " + items.length;
}

function showAnswers(id){
  const box = document.getElementById("ex-" + id);
  const type = box.dataset.type;
  const items = box.querySelectorAll(".item");

  items.forEach(item=>{
    const answer = item.dataset.answer;
    const firstAnswer = answer.split("|")[0];
    let note = item.querySelector(".correct-answer-note");
    if(!note){
      note = document.createElement("span");
      note.className = "correct-answer-note";
      item.querySelector(".q") ? item.appendChild(note) : item.appendChild(note);
    }
    note.textContent = "Ответ: " + (type === "radio" ? item.querySelectorAll(".radio-opts label")[Number(answer)].textContent.trim() : firstAnswer);

    if(type === "text"){
      item.querySelector(".answer-input").value = firstAnswer;
    } else if(type === "select"){
      item.querySelector("select").value = firstAnswer;
    } else if(type === "radio"){
      const radios = item.querySelectorAll("input[type=radio]");
      radios[Number(answer)].checked = true;
    }
  });
}

function resetExercise(id){
  const box = document.getElementById("ex-" + id);
  const type = box.dataset.type;
  const items = box.querySelectorAll(".item");
  items.forEach(item=>{
    item.querySelector(".fb").textContent = "";
    const note = item.querySelector(".correct-answer-note");
    if(note) note.remove();
    if(type === "text"){
      const input = item.querySelector(".answer-input");
      input.value = "";
      input.classList.remove("correct","incorrect");
    } else if(type === "select"){
      const sel = item.querySelector("select");
      sel.value = "";
      sel.classList.remove("correct","incorrect");
    } else if(type === "radio"){
      item.querySelectorAll("input[type=radio]").forEach(r=>r.checked=false);
      item.querySelectorAll(".radio-opts label").forEach(l=>l.classList.remove("correct","incorrect"));
    }
  });
  document.getElementById("score-" + id).textContent = "—";
}

/* ---------- TABS ---------- */

document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("panel-" + btn.dataset.tab).classList.add("active");
    window.scrollTo({top:0, behavior:"smooth"});
  });
});

renderAll();
</script>
